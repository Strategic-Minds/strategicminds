name: Preview Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate source truth
        run: |
          test -f package.json
          test -f vercel.json
          test -f middleware.ts
          test -f public/manifest.json
          test -f docs/01-builder-docs/VERCEL_WORKFLOW_MASTER_INVOCATION.md
          test -f docs/06-governance/VALIDATION_GATE.md
          test -f docs/06-governance/ROLLBACK_CHECKLIST.md
          test -f docs/06-governance/AUTH_HARDENING_PLAN.md
          test -f docs/06-governance/SUPABASE_RLS_DRAFT.md
          test -f docs/06-governance/PLAYWRIGHT_ROUTE_COVERAGE.md
          test -f supabase/migrations/202606110001_preview_rls_draft.sql
          test -f tests/preview-route-manifest.json
          test -f scripts/validate-preview-routes.mjs
